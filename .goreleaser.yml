version: 2

builds:
  - main: .
    binary: ruche
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/FacileStudio/Ruche/cmd.version={{.Version}}

arcruches:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: FacileStudio
      name: homebrew-tap
    name: ruche
    homepage: https://github.com/FacileStudio/Ruche
    description: Shared agent brain across AI coding agents and machines

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
